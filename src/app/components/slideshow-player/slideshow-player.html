@if (currentImageSrc != null) {
    <div class="fixed inset-0 flex flex-col items-center justify-center bg-black">
        @if (slideshowService.isRunning()) {
            <div
                class="countdown-bar"
                [style.transform]="'scaleX(' + slideshowService.countdownProgress() + ')'"
                aria-hidden="true"
            ></div>
        }
        <div class="loading-indicator-wrap">
            @if (slideshowService.isLoading()) {
                <div class="loading-indicator" aria-label="Loading image"></div>
            }
        </div>

        <div
            class="image-stage"
            [class.cursor-hidden]="shouldHideCursor()"
            (mousemove)="onImageMouseMove()"
            (mouseenter)="onImageMouseEnter()"
            (mouseleave)="onImageMouseLeave()"
            (click)="slideshowService.isRunning() && slideshowService.pause()"
        >
            <img
                [src]="currentImageSrc"
                alt="Slideshow"
                class="slide-image base-image"
                [class.base-image-fading]="isImageTransitioning"
            />

            @if (transitioningImageSrc != null) {
                <img
                    [src]="transitioningImageSrc"
                    alt=""
                    aria-hidden="true"
                    class="slide-image incoming-image"
                    [class.incoming-image-visible]="isImageTransitioning"
                />
            }
        </div>
        
        <div
            class="controls absolute bottom-4 right-4 flex gap-4 opacity-25 hover:opacity-100 transition-opacity p-8"
            [class.controls-hidden]="shouldHideControls()"
        >
            <button
                (click)="toggleFullscreen()"
                class="control-button fullscreen-toggle-button disabled:opacity-60 disabled:cursor-not-allowed"
                [disabled]="!isFullscreenAvailable()"
                [attr.aria-label]="isFullscreen ? 'Exit full screen' : 'Enter full screen'"
                [attr.title]="isFullscreen ? 'Exit full screen' : 'Enter full screen'"
            >
                @if (isFullscreen) { &#x2921; } @else { &#x2922; }
            </button>
            
            <button
                (click)="slideshowService.isPaused() ? slideshowService.resume() : slideshowService.pause()"
                class="control-button playback-control-button"
                [attr.aria-label]="slideshowService.isPaused() ? 'Resume slideshow' : 'Pause slideshow'"
                [attr.title]="slideshowService.isPaused() ? 'Resume slideshow' : 'Pause slideshow'"
                >
                @if (slideshowService.isPaused()) { &#9654; } @else { &#9208; }
            </button>
        
            <button
                (click)="slideshowService.stop()"
                class="control-button playback-control-button"
                aria-label="Stop slideshow"
                title="Stop slideshow"
                >
                &#9209;
            </button>
    
            <button
                (click)="slideshowService.previous()"
                class="control-button playback-control-button"
                aria-label="Previous image"
                title="Previous image"
            >
            &#9198;
            </button>
    
            <button
                (click)="slideshowService.next()"
                class="control-button playback-control-button"
                aria-label="Next image"
                title="Next image"
                >
                &#9197;
            </button>
    
        </div>
    
    </div>
} @else {
    <div class="fixed inset-0 flex flex-col items-center justify-center bg-black">
        <p>Loading images...</p>
    </div>
}
